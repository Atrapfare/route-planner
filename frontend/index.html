<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Planner</title>

    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="controls">
        <div id="header">
            <span id="header-title">Route Planner</span>
        </div>

        <div class="section">
            <div class="section-label">LAST CLICK</div>
            <div class="info-value" id="coordinates">—</div>
        </div>

        <div class="section">
            <div class="section-label">SOURCE</div>
            <div class="info-value" id="source-coords">Not set</div>
            <div class="info-sub" id="source-id"></div>
        </div>

        <div class="section">
            <div class="section-label">TARGET</div>
            <div class="info-value" id="target-coords">Not set</div>
            <div class="info-sub" id="target-id"></div>
        </div>

        <div class="section" id="route-section" style="display:none">
            <div class="section-label">ROUTE</div>
            <div class="route-stat"><span class="stat-label">Distance</span><span class="stat-value" id="stat-distance">—</span></div>
            <div class="route-stat"><span class="stat-label">Nodes</span><span class="stat-value" id="stat-nodes">—</span></div>
            <div class="route-stat"><span class="stat-label">Computation time</span><span class="stat-value" id="stat-time">—</span></div>
        </div>

        <div class="section">
            <div class="section-label">ACTIONS</div>
            <div id="action-buttons">
                <button id="btn-set-source">Set Source</button>
                <button id="btn-set-target">Set Target</button>
            </div>
            <button id="btn-calculate">Calculate Route</button>
        </div>

        <div id="status" class="status-idle">Select an action</div>

        <button id="btn-clear">✕ Reset</button>
    </div>

    <div id="map"></div>

    <!-- Error modal -->
    <div id="modal-overlay">
        <div id="modal">
            <div id="modal-icon">⚠️</div>
            <div id="modal-title"></div>
            <div id="modal-body"></div>
            <div id="modal-details"></div>
            <button id="modal-close">OK</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
